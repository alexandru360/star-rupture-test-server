services:
  starrupture-ptb:
    image: alex360/starrupture-ptb:latest
    #image: ghcr.io/alexandru360/starrupture-ptb:latest # Alternate location
    container_name: starrupture-ptb
    environment:
      TZ: "UTC"
      SKIP_UPDATE: "0"
      ENABLE_LOG: "1"
      GAME_PORT: "7777"
      BETA_BRANCH: "public_test_branch"
      # ADMIN_PASSWORD: ""
      # PLAYER_PASSWORD: ""
      # FORCE_CHANGE_ADMIN: "0"
      # FORCE_CHANGE_PLAYER: "0"
      # REMOVE_SERVER_FILES: "0"
      # BACKUP_SETTINGS: "1"
    volumes:
      - /path/to/server:/home/steam/starrupture/server
      - /path/to/data:/home/steam/starrupture/data
    ports:
      - "7777:7777/udp"
      # - "7777:7777/tcp"  # Removed to mitigate vulnerability.
    restart: unless-stopped